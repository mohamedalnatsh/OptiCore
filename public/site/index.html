<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OptiCore — The Core of Optimization</title>
<meta name="description" content="OptiCore solutions: secure your assets, build your web presence, and automate your workflow." />
<link rel="icon" type="image/webp" href="/images/opticore-logo.webp" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/images/opticore-logo.png" alt="OptiCore logo" class="brand-mark" />
      <span>OptiCore</span>
    </div>
  </header>

  <main class="hero">
    <img src="/images/opticore-logo.png" alt="" class="hero-logo" />
    <h1>OptiCore Solutions</h1>

    <section class="cards">
      <article class="card" data-card="1">
        <div class="card-art">
          <img src="/images/secure-assets.png" alt="Secure your assets illustration" />
        </div>
        <h2>🛡️ 1. Secure Your Assets</h2>
        <button class="pill pill-primary"><i class="fa-solid fa-shield-halved"></i> Site &amp; Server Hardening</button>
        <button class="pill"><i class="fa-solid fa-network-wired"></i> Network &amp; Router Audit</button>
      </article>

      <article class="card" data-card="2">
        <div class="card-art">
          <img src="/images/web-presence.png" alt="Build your web presence illustration" />
        </div>
        <h2>&lt;/&gt; 2. Build Your Web Presence</h2>
        <button class="pill"><i class="fa-solid fa-code"></i> Dynamic Frontend UIs</button>
        <button class="pill"><i class="fa-solid fa-laptop-code"></i> UX-Focused Lightweight Sites</button>
      </article>

      <article class="card" data-card="3">
        <div class="card-art">
          <img src="/images/automate-workflow.png" alt="Automate your workflow illustration" />
        </div>
        <h2>⚙️ 3. Automate Your Workflow</h2>
        <button class="pill"><i class="fa-brands fa-telegram"></i> Custom Telegram Bots</button>
        <button class="pill"><i class="fa-brands fa-whatsapp"></i> WhatsApp Business Automation</button>
      </article>
    </section>

    <button id="cta" class="cta">Start a Project Now</button>
  </main>

  <div class="sparkle" aria-hidden="true">✦</div>

  <footer class="footer">
    <nav class="foot-links">
      <a href="#contact">Contact Us</a> |
      <a href="#terms">terms</a> |
      <a href="#privacy">privacy</a> |
      <a href="#services">services</a> |
      <a href="#support">support</a>
    </nav>
    <div class="socials">
      <a href="#" aria-label="WhatsApp"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/whatsapp.svg" alt="WhatsApp" /></a>
      <a href="#" aria-label="GitHub"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/github.svg" alt="GitHub" /></a>
      <a href="#" aria-label="Instagram"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg" alt="Instagram" /></a>
      <a href="#" aria-label="LinkedIn"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/linkedin.svg" alt="LinkedIn" /></a>
    </div>
    <div class="tag">OptiCore.dev | The Core of Optimization</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
