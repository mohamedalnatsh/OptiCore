<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Not Found</title>
    <meta
      name="description"
      content="The page you requested could not be found."
    />
    <link rel="icon" type="image/png" href="images/opticore-logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="logo-link">
          <img
            src="/images/opticore-logo.webp"
            alt="OptiCore logo"
            class="brand-mark"
          />
          <span>OptiCore</span>
        </a>
      </div>
    </header>

    <main class="hero content-hero">
      <img src="/images/opticore-logo.webp" alt="" class="hero-logo" />
      <h1><span data-i18n="notFoundTitle">Page Not Found</span></h1>
      <p class="content-sub" data-i18n="notFoundText">
        The page you are looking for does not exist or may have moved.
      </p>
      <div class="hero-actions">
        <a class="cta" href="index.html" role="button">
          <span data-i18n="notFoundCta">Back to Home</span>
        </a>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
