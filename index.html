    <link
      rel="preload"

      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

      rel="preload"

  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="logo-link">
          <img
            src="./images/opticore-logo.webp"
            alt="OptiCore logo"
            class="brand-mark"
            width="150"
            height="150"
          />

        </a>
      </div>
      <button id="langToggle" class="lang-toggle" aria-label="Toggle language">
        🌐 العربية

    <main class="hero">
      <img src="./images/opticore-logo.webp" alt="" class="hero-logo" />
      <h1><span data-i18n="heroTitle">OptiCore Solutions</span></h1>

      <section class="cards" id="projects">
        <article class="card" data-card="1">
          <div class="card-art">
            <img
              src="./images/secure-assets.webp"
              alt="Secure your assets illustration"
              fetchpriority="high"
            />
          </div>
          <h2>
            <span class="title-emoji">🛡️</span>
            <span data-i18n="card1Title">1. Secure Your Assets</span>
          </h2>
          <button class="pill pill-primary">
            <i class="fa-solid fa-shield-halved"></i>
            <span data-i18n="card1Btn1">Site &amp; Server Hardening</span>
          </button>
          <button class="pill">
            <i class="fa-solid fa-network-wired"></i>
            <span data-i18n="card1Btn2">Network &amp; Router Audit</span>
          </button>
        </article>

        <article class="card" data-card="2">
          <div class="card-art">
            <img
              src="./images/web-presence.webp"
              alt="Build your web presence illustration"
              fetchpriority="high"
            />
          </div>
          <h2>
            <span class="title-emoji">🌐</span>
            <span data-i18n="card2Title">2. Build Your Web Presence</span>
          </h2>
          <button class="pill">
            <i class="fa-solid fa-code"></i>
            <span data-i18n="card2Btn1">Dynamic Frontend UIs</span>
          </button>
          <button class="pill">
            <i class="fa-solid fa-laptop-code"></i>
            <span data-i18n="card2Btn2">UX-Focused Lightweight Sites</span>
          </button>
        </article>

        <article class="card" data-card="3">
          <div class="card-art">
            <img
              src="./images/automate-workflow.webp"
              alt="Automate your workflow illustration"
            />
          </div>
          <h2>
            <span class="title-emoji">⚙️</span>
            <span data-i18n="card3Title">3. Automate Your Workflow</span>
          </h2>
          <button class="pill">
            <i class="fa-brands fa-telegram"></i>
            <span data-i18n="card3Btn1">Custom Telegram Bots</span>
          </button>
          <button class="pill">
            <i class="fa-brands fa-whatsapp"></i>
            <span data-i18n="card3Btn2">WhatsApp Business Automation</span>
          </button>
        </article>
      </section>

      <div class="hero-actions">
        <a id="cta" class="cta" href="contact.html" role="button">
          <span data-i18n="ctaText">Start a Project Now</span>
        </a>
        <a class="cta cta-secondary" href="OurProjects.html" role="button">
          <span data-i18n="projectsCta">Our projects</span>
        </a>
      </div>

      <nav class="foot-links">
        <a href="contact.html"

          target="_blank"

          aria-label="Instagram"

          <img
            src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg"
